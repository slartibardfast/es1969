name: Build driver

# Legacy WinDDK (3790.1830) builds of the ES1969 (Solo-1) WDM driver.
#
# The driver MUST load on Windows 2000 RTM and Windows XP RTM, whose loaders
# reject a PE whose subsystem version is above their own. So it is built with the
# DDK's W2K target (subsystem 5.00), NOT the modern WDK10 toolset. The DDK is a
# self-contained toolchain (its own cl/link/headers/libs), fetched from the
# 9176324/WinDDK archive, so no Visual Studio is needed.
#
# Two NT lanes here:
#   * nt-x86-win2k  — W2K target (subsystem 5.00) for Windows 2000 RTM / XP RTM
#   * nt-x64-wnet   — WNET AMD64  (subsystem 5.02) for Windows XP x64 / Server 2003
# The third lane (Windows 98SE/ME, Win9x WDM) needs a different DDK (the Win2K DDK
# with VC6, per the WDMHDA recipe) and is tracked in the host milestone plan/0001.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.lane }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: nt-x86-win2k
            target: W2K
            arch: ""
            subsystem: "5.00"
          - lane: nt-x64-wnet
            target: WNET
            arch: AMD64
            subsystem: "5.02"

    steps:
      - name: Checkout es1969
        uses: actions/checkout@v4
        with:
          path: es1969

      - name: Fetch WinDDK 3790.1830 (bin + inc + lib)
        shell: pwsh
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/9176324/WinDDK ddk
          git -C ddk sparse-checkout set 3790.1830/bin 3790.1830/inc 3790.1830/lib
          if (-not (Test-Path ddk/3790.1830/bin/setenv.bat)) { throw "DDK setenv.bat missing after sparse checkout" }

      - name: Build with the DDK (${{ matrix.lane }})
        shell: cmd
        run: |
          set "BASEDIR=%GITHUB_WORKSPACE%\ddk\3790.1830"
          rem This DDK archive ships no stdunk.lib under lib\w2k\i386 (sources needs it).
          rem stdunk is the i386 CUnknown static lib; the subsystem version is set by the
          rem linker via _NT_TARGET_VERSION, not the lib, so the wxp/i386 copy links fine.
          if not exist "%BASEDIR%\lib\w2k\i386\stdunk.lib" copy /y "%BASEDIR%\lib\wxp\i386\stdunk.lib" "%BASEDIR%\lib\w2k\i386\stdunk.lib"
          rem setenv.bat does `set BASEDIR=%1`, so pass it UNQUOTED (the workspace path
          rem has no spaces) — a quoted arg embeds the quotes in every DDK path.
          call "%BASEDIR%\bin\setenv.bat" %BASEDIR% fre ${{ matrix.target }} ${{ matrix.arch }}
          cd /d "%GITHUB_WORKSPACE%\es1969\src\win2k"
          build -cZ -w
          echo ===================== build.err =====================
          if exist build.err type build.err
          echo ===================== build.wrn =====================
          if exist build.wrn type build.wrn
          echo ===================== obj tree ======================
          dir /s /b obj* 2>nul

      - name: Collect es1969.sys
        shell: pwsh
        run: |
          $sys = Get-ChildItem -Recurse -Path es1969/src/win2k -Filter es1969.sys -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sys) {
            Write-Host "::error::es1969.sys not found; build output tree:"
            Get-ChildItem -Recurse -Path es1969/src/win2k -Directory | Select-Object -ExpandProperty FullName
            exit 1
          }
          Write-Host "Built: $($sys.FullName)  ($([math]::Round($sys.Length/1KB,1)) KB)"
          New-Item -ItemType Directory -Force out | Out-Null
          Copy-Item $sys.FullName out/
          if (Test-Path es1969/src/win2k/es1969.inf) { Copy-Item es1969/src/win2k/es1969.inf out/ }

      - name: Verify PE subsystem version (Win2K RTM load condition)
        shell: cmd
        env:
          WANT_SUBSYS: ${{ matrix.subsystem }}
        run: |
          for /f "delims=" %%L in ('dir /s /b "%GITHUB_WORKSPACE%\es1969\src\win2k\es1969.sys"') do set "SYS=%%L"
          for /f "delims=" %%K in ('dir /s /b "%GITHUB_WORKSPACE%\ddk\3790.1830\bin\link.exe"') do set "LINK=%%K"
          "%LINK%" -dump -headers "%SYS%" > headers.txt
          echo --- PE version fields ---
          findstr /i "subsystem version operating system version image version" headers.txt
          findstr /i /c:"%WANT_SUBSYS% subsystem version" headers.txt >nul && (echo OK: subsystem %WANT_SUBSYS% as required) || (echo ::warning::expected subsystem version %WANT_SUBSYS%)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: es1969-${{ matrix.lane }}
          path: out/
          if-no-files-found: error
